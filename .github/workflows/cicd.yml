name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Run Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Build Next.js
        run: npm run build
        env:
          # Pastikan NEXT_PUBLIC variables di-set jika dibutuhkan saat build
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          DATABASE_URL: "mysql://localhost:3306/dummy" # Hanya untuk lolos validasi build

  deploy:
    name: Deploy to VPS
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Execute deployment script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            cd /var/www/uc96
            
            echo "Pulling latest changes from GitHub..."
            git pull origin main
            
            echo "Installing dependencies..."
            npm install
            
            echo "Syncing Prisma Database..."
            npx prisma generate
            npx prisma db push
            
            echo "Building application..."
            npm run build
            
            echo "Restarting application with PM2..."
            pm2 restart uc96 || pm2 start npm --name "uc96" -- run start
            pm2 save
